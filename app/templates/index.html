<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo QA Project — Clean Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">✓</div>
        <div>
          <h1>Todo QA</h1>
          <p>Учебный pet-project</p>
        </div>
      </div>

      <div class="sidebar-card">
        <h3>Фильтр статусов</h3>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">Все</button>
          <button class="filter-btn" data-filter="new">New</button>
          <button class="filter-btn" data-filter="in_progress">In Progress</button>
          <button class="filter-btn" data-filter="done">Done</button>
        </div>
      </div>

      <div class="sidebar-card">
        <h3>Инфо</h3>
        <p id="authStateText">Вы не авторизованы</p>
        <p id="userText">Пользователь: —</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>Task Dashboard</h2>
          <p class="muted">Простой и чистый интерфейс для задач</p>
        </div>
        <div class="topbar-actions">
          <button id="showLoginBtn" class="ghost-btn">Войти</button>
          <button id="showRegisterBtn" class="ghost-btn">Регистрация</button>
          <button id="logoutBtn" class="danger-btn hidden">Logout</button>
        </div>
      </header>

      <section id="messageBox" class="message hidden"></section>

      <section id="authSection" class="auth-grid">
        <div class="card">
          <h3>Вход</h3>
          <form id="loginForm" class="form">
            <input type="text" id="loginUsername" placeholder="Username" required />
            <input type="password" id="loginPassword" placeholder="Password" required />
            <button type="submit" class="primary-btn">Войти</button>
          </form>
        </div>

        <div class="card">
          <h3>Регистрация</h3>
          <form id="registerForm" class="form">
            <input type="text" id="registerUsername" placeholder="Username" required />
            <input type="password" id="registerPassword" placeholder="Password" required />
            <button type="submit" class="primary-btn">Зарегистрироваться</button>
          </form>
        </div>
      </section>

      <section id="appSection" class="app-section hidden">
        <div class="card">
          <div class="section-head">
            <h3>Новая задача</h3>
          </div>

          <form id="taskForm" class="task-form">
            <input type="text" id="taskTitle" placeholder="Название задачи" required />
            <textarea id="taskDescription" placeholder="Описание"></textarea>

            <div class="row">
              <select id="taskPriority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>

              <button type="submit" class="primary-btn">Добавить задачу</button>
            </div>
          </form>
        </div>

        <div class="card">
          <div class="section-head">
            <h3>Список задач</h3>
            <button id="reloadTasksBtn" class="ghost-btn">Обновить</button>
          </div>

          <div id="tasksList" class="tasks-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
